version: '3.8'
services:
  doa-app:
    image: doa-ops-hub:latest
    build: .
    ports:
      - "3010:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=VPSnet"
      - "traefik.http.routers.doa-next.rule=Host(`doa.testn8n.com`)"
      - "traefik.http.routers.doa-next.entrypoints=websecure"
      - "traefik.http.routers.doa-next.tls.certresolver=letsencryptresolver"
      - "traefik.http.routers.doa-next.priority=100"
      - "traefik.http.services.doa-next.loadbalancer.server.port=3000"
    networks:
      - doa-network
      - VPSnet

networks:
  doa-network:
    driver: bridge
  VPSnet:
    external: true
